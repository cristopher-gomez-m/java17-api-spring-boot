services:

  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5431:5432"

  app:
    build: .
    container_name: api-java-test-app
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8000:8000"