services:

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev

    env_file:
      - .env

    ports:
      - "8080:8080"

    develop:
      watch:

        - action: sync
          path: ./src
          target: /app/src

        - action: rebuild
          path: build.gradle

        - action: rebuild
          path: Dockerfile.dev